<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Auto Visitor · Dual Mode (Embed + Direct)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .automator-card {
      max-width: 1400px;
      width: 100%;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      border: 1px solid rgba(56, 189, 248, 0.2);
      overflow: hidden;
    }
    .control-panel {
      padding: 1.5rem 2rem;
      background: rgba(2, 8, 23, 0.7);
      border-bottom: 1px solid rgba(71, 85, 105, 0.4);
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
    }
    .mode-toggle {
      display: flex;
      gap: 1rem;
      background: #0f172a;
      padding: 0.3rem;
      border-radius: 3rem;
      align-items: center;
    }
    .mode-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      color: #94a3b8;
      transition: 0.2s;
    }
    .mode-btn.active {
      background: #38bdf8;
      color: #0f172a;
      box-shadow: 0 0 8px #38bdf8;
    }
    .input-group { flex: 2; min-width: 200px; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }
    .url-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 1.2rem;
      padding: 0.7rem 1.2rem;
      color: #f1f5f9;
      font-family: monospace;
    }
    .options-row {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .opt-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      background: #0f172a60;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
    }
    .opt-item label { font-size: 0.65rem; color: #94a3b8; }
    .delay-input, .clicks-input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 2rem;
      padding: 0.4rem 0.8rem;
      width: 80px;
      color: white;
      text-align: center;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      background: #0f172a;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      border: 1px solid #334155;
      color: #cbd5e1;
    }
    .button-group { display: flex; gap: 1rem; }
    .btn {
      border: none;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      cursor: pointer;
      background: #1e293b;
      color: #e2e8f0;
    }
    .btn-start { background: #0f3b2c; border: 1px solid #22c55e; color: #bbf7d0; }
    .btn-stop { background: #3b1e2a; border: 1px solid #ef4444; color: #fecaca; }
    .status-area {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 2rem;
      background: #02061760;
      font-size: 0.75rem;
      border-bottom: 1px solid #1e293b;
      flex-wrap: wrap;
    }
    .status-badge { font-family: monospace; background: #0f172a; padding: 0.2rem 1rem; border-radius: 3rem; color: #7dd3fc; }
    .viewport { padding: 1rem 1.5rem 1.8rem 1.5rem; background: #020617; }
    .iframe-wrapper { border-radius: 1.5rem; overflow: hidden; border: 1px solid #2d3a5e; background: #0f172a; }
    iframe { width: 100%; height: 550px; display: block; border: none; background: white; }
    .click-feedback {
      position: fixed;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd966, #ffaa33);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.15s;
    }
    footer { padding: 0.7rem 2rem; text-align: center; font-size: 0.7rem; color: #4b556b; border-top: 1px solid #1e293b; }
    @media (max-width: 1000px) {
      .control-panel { flex-direction: column; align-items: stretch; }
      .options-row { flex-direction: column; align-items: stretch; }
      iframe { height: 420px; }
    }
  </style>
</head>
<body>
<div class="automator-card">
  <div class="control-panel">
    <div class="mode-toggle">
      <button id="modeEmbedBtn" class="mode-btn active">🌐 Embed mode (iframe)</button>
      <button id="modeDirectBtn" class="mode-btn">📄 Direct mode (on this page)</button>
    </div>
    <div class="input-group" id="urlInputGroup">
      <label>🔗 TARGET URL (embed mode only)</label>
      <input type="text" id="siteUrl" class="url-input" placeholder="https://example.com" value="https://example.com">
    </div>
    <div class="options-row">
      <div class="opt-item"><label>⏱️ CYCLE DELAY (sec)</label><input type="number" id="cycleDelay" class="delay-input" value="3" step="0.5" min="1"></div>
      <div class="opt-item"><label>🎲 CLICKS (min/max)</label><div style="display:flex;gap:5px"><input type="number" id="minClicks" class="clicks-input" value="3" min="1"><input type="number" id="maxClicks" class="clicks-input" value="4" min="1"></div></div>
      <div class="opt-item"><label>⏲️ CLICK DELAY (sec)</label><input type="number" id="clickDelay" class="delay-input" value="0.15" step="0.05"></div>
      <div class="opt-item"><label class="checkbox-label"><input type="checkbox" id="randomClickToggle"> 🎯 Random positions</label></div>
    </div>
    <div class="button-group">
      <button id="startBtn" class="btn btn-start">▶ START LOOP</button>
      <button id="stopBtn" class="btn btn-stop">⏹️ STOP</button>
    </div>
  </div>
  <div class="status-area">
    <div class="status-badge" id="statusMsg">⚡ idle</div>
    <div class="status-badge" id="cycleCounter">🔄 cycles: 0</div>
  </div>
  <div class="viewport" id="viewportEmbed">
    <div class="iframe-wrapper"><iframe id="targetFrame" title="target site" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation"></iframe></div>
  </div>
  <footer>💡 <strong>Embed mode</strong>: clicks inside iframe (surface if cross‑origin). <strong>Direct mode</strong>: clicks real elements on current page + refreshes page. All settings apply.</footer>
</div>
<div id="clickEffect" class="click-feedback"></div>

<script>
  (function() {
    // DOM elements
    const modeEmbedBtn = document.getElementById('modeEmbedBtn');
    const modeDirectBtn = document.getElementById('modeDirectBtn');
    const urlInputGroup = document.getElementById('urlInputGroup');
    const siteUrlInput = document.getElementById('siteUrl');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const iframe = document.getElementById('targetFrame');
    const viewportEmbed = document.getElementById('viewportEmbed');
    const statusSpan = document.getElementById('statusMsg');
    const cycleCounterSpan = document.getElementById('cycleCounter');
    const cycleDelayInput = document.getElementById('cycleDelay');
    const minClicksInput = document.getElementById('minClicks');
    const maxClicksInput = document.getElementById('maxClicks');
    const clickDelayInput = document.getElementById('clickDelay');
    const randomClickToggle = document.getElementById('randomClickToggle');
    const clickEffectDiv = document.getElementById('clickEffect');

    // state
    let currentMode = 'embed'; // 'embed' or 'direct'
    let running = false;
    let cycleCount = 0;
    let currentTimeout = null;
    let currentLoadHandler = null;
    let currentSafetyTimer = null;
    let directRefreshTimeout = null;

    // Helper: show click ripple
    function showClickRipple(clientX, clientY, color = '#ffd966') {
      if (!clickEffectDiv) return;
      clickEffectDiv.style.background = `radial-gradient(circle, ${color}, #ffaa33)`;
      clickEffectDiv.style.left = clientX + 'px';
      clickEffectDiv.style.top = clientY + 'px';
      clickEffectDiv.style.opacity = '0.9';
      setTimeout(() => { if (clickEffectDiv) clickEffectDiv.style.opacity = '0'; }, 180);
      setTimeout(() => { if (clickEffectDiv) clickEffectDiv.style.background = `radial-gradient(circle, #ffd966, #ffaa33)`; }, 200);
    }

    // ----- EMBED MODE LOGIC (iframe) -----
    function normalizeUrl(url) {
      let u = url.trim();
      if (!u) return '';
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      return u;
    }
    function addForceReloadParam(url) {
      try {
        const urlObj = new URL(url);
        urlObj.searchParams.set('_autorefresh', Date.now());
        return urlObj.toString();
      } catch(e) { return url + (url.includes('?')?'&':'?') + '_autorefresh=' + Date.now(); }
    }
    function tryDeepClickInsideIframe(randomMode) {
      try {
        const doc = iframe.contentDocument;
        if (!doc) return false;
        const body = doc.body;
        if (!body) return false;
        let targetElement;
        if (randomMode) {
          const els = doc.querySelectorAll('a, button, input, div, p, span, img');
          if (els.length) targetElement = els[Math.floor(Math.random() * els.length)];
          else targetElement = body;
        } else targetElement = body;
        const win = iframe.contentWindow;
        let clickX, clickY;
        if (targetElement === body) {
          const w = win.innerWidth || doc.documentElement.clientWidth;
          const h = win.innerHeight || doc.documentElement.clientHeight;
          clickX = w/2; clickY = h/2;
        } else {
          const rect = targetElement.getBoundingClientRect();
          clickX = rect.left + rect.width/2;
          clickY = rect.top + rect.height/2;
        }
        const clickEvent = new MouseEvent('click', { view: win, bubbles: true, cancelable: true, clientX: clickX, clientY: clickY });
        targetElement.dispatchEvent(clickEvent);
        const iframeRect = iframe.getBoundingClientRect();
        const scaleX = iframeRect.width / (win.innerWidth || 1);
        const scaleY = iframeRect.height / (win.innerHeight || 1);
        const globalX = iframeRect.left + clickX * scaleX;
        const globalY = iframeRect.top + clickY * scaleY;
        showClickRipple(globalX, globalY, '#ffd966');
        return true;
      } catch(e) { return false; }
    }
    function simulateClickOnIframeSurface(randomMode) {
      const rect = iframe.getBoundingClientRect();
      if (rect.width === 0) return;
      let x, y;
      if (randomMode) { x = rect.left + Math.random() * rect.width; y = rect.top + Math.random() * rect.height; }
      else { x = rect.left + rect.width/2; y = rect.top + rect.height/2; }
      iframe.dispatchEvent(new MouseEvent('click', { view: window, bubbles: true, clientX: x, clientY: y }));
      showClickRipple(x, y, '#ffaa66');
    }
    async function performEmbedClick() {
      const randomMode = randomClickToggle.checked;
      const ok = tryDeepClickInsideIframe(randomMode);
      if (!ok) simulateClickOnIframeSurface(randomMode);
    }
    async function performEmbedClickSequence() {
      let min = parseInt(minClicksInput.value,10), max = parseInt(maxClicksInput.value,10);
      if (isNaN(min)) min=3; if (isNaN(max)) max=4;
      if (min>max) {let t=min; min=max; max=t;}
      const num = Math.floor(Math.random() * (max-min+1)) + min;
      const delayMs = Math.max(50, (parseFloat(clickDelayInput.value)||0.15)*1000);
      for (let i=0; i<num && running; i++) {
        await performEmbedClick();
        if (i < num-1 && running) await new Promise(r => setTimeout(r, delayMs));
      }
    }

    // ----- DIRECT MODE LOGIC (real page clicks + refresh) -----
    function getClickableElements() {
      const exclude = 'button, .mode-btn, .btn, input, select, textarea, a, [role=button], .auto-panel, .click-feedback, #startBtn, #stopBtn, #modeEmbedBtn, #modeDirectBtn';
      return Array.from(document.querySelectorAll('body *')).filter(el => {
        if (!el.isConnected) return false;
        const rect = el.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return false;
        if (el.closest('.mode-toggle') || el.closest('.button-group') || el.closest('.control-panel')) return false;
        if (el.matches && el.matches(exclude)) return false;
        return true;
      });
    }
    async function performDirectClick() {
      const elements = getClickableElements();
      if (elements.length === 0) return false;
      const target = elements[Math.floor(Math.random() * elements.length)];
      const rect = target.getBoundingClientRect();
      const x = rect.left + rect.width/2;
      const y = rect.top + rect.height/2;
      const clickEvent = new MouseEvent('click', { view: window, bubbles: true, cancelable: true, clientX: x, clientY: y });
      target.dispatchEvent(clickEvent);
      showClickRipple(x, y, '#88ccff');
      return true;
    }
    async function performDirectClickSequence() {
      let min = parseInt(minClicksInput.value,10), max = parseInt(maxClicksInput.value,10);
      if (isNaN(min)) min=3; if (isNaN(max)) max=4;
      if (min>max) {let t=min; min=max; max=t;}
      const num = Math.floor(Math.random() * (max-min+1)) + min;
      const delayMs = Math.max(50, (parseFloat(clickDelayInput.value)||0.15)*1000);
      for (let i=0; i<num && running; i++) {
        await performDirectClick();
        if (i < num-1 && running) await new Promise(r => setTimeout(r, delayMs));
      }
    }

    // ----- CYCLE CONTROLLER (mode-aware) -----
    async function runCycle() {
      if (!running) return;
      if (currentMode === 'embed') {
        // embed: refresh iframe -> wait load -> clicks -> delay -> repeat
        if (currentLoadHandler) iframe.removeEventListener('load', currentLoadHandler);
        const baseUrl = normalizeUrl(siteUrlInput.value);
        if (!baseUrl) { stopAutomation(); statusSpan.innerHTML = '❌ Invalid URL'; return; }
        iframe.src = addForceReloadParam(baseUrl);
        statusSpan.innerHTML = `🔄 Refreshing iframe...`;
        const onLoad = async () => {
          if (!running) return;
          await performEmbedClickSequence();
          if (!running) return;
          const cycleDelaySec = parseFloat(cycleDelayInput.value) || 3;
          statusSpan.innerHTML = `⏳ Wait ${cycleDelaySec}s then next cycle`;
          if (currentTimeout) clearTimeout(currentTimeout);
          currentTimeout = setTimeout(() => {
            if (running) { cycleCount++; cycleCounterSpan.innerText = `🔄 cycles: ${cycleCount}`; runCycle(); }
          }, cycleDelaySec * 1000);
          if (currentLoadHandler) iframe.removeEventListener('load', currentLoadHandler);
        };
        currentLoadHandler = onLoad;
        iframe.addEventListener('load', currentLoadHandler);
        // safety timeout
        if (currentSafetyTimer) clearTimeout(currentSafetyTimer);
        currentSafetyTimer = setTimeout(() => {
          if (running && currentLoadHandler) {
            iframe.removeEventListener('load', currentLoadHandler);
            currentLoadHandler = null;
            performEmbedClickSequence().then(() => {
              if (running) {
                const cycleDelaySec = parseFloat(cycleDelayInput.value) || 3;
                currentTimeout = setTimeout(() => {
                  if (running) { cycleCount++; cycleCounterSpan.innerText = `🔄 cycles: ${cycleCount}`; runCycle(); }
                }, cycleDelaySec * 1000);
              }
            });
          }
        }, 10000);
      } 
      else { // direct mode
        await performDirectClickSequence();
        if (!running) return;
        const cycleDelaySec = parseFloat(cycleDelayInput.value) || 3;
        statusSpan.innerHTML = `⏳ Wait ${cycleDelaySec}s then refresh page`;
        if (directRefreshTimeout) clearTimeout(directRefreshTimeout);
        directRefreshTimeout = setTimeout(() => {
          if (running) {
            cycleCount++;
            cycleCounterSpan.innerText = `🔄 cycles: ${cycleCount}`;
            statusSpan.innerHTML = `🔄 Refreshing page...`;
            location.reload();
          }
        }, cycleDelaySec * 1000);
      }
    }

    function stopAutomation() {
      running = false;
      if (currentTimeout) { clearTimeout(currentTimeout); currentTimeout = null; }
      if (currentSafetyTimer) { clearTimeout(currentSafetyTimer); currentSafetyTimer = null; }
      if (directRefreshTimeout) { clearTimeout(directRefreshTimeout); directRefreshTimeout = null; }
      if (currentLoadHandler) { iframe.removeEventListener('load', currentLoadHandler); currentLoadHandler = null; }
      statusSpan.innerHTML = '⏹️ Stopped';
      startBtn.disabled = false;
    }

    function startAutomation() {
      if (running) stopAutomation();
      if (currentMode === 'embed') {
        const url = normalizeUrl(siteUrlInput.value);
        if (!url) { statusSpan.innerHTML = '❌ Enter a valid URL'; return; }
        try { new URL(url); } catch(e) { statusSpan.innerHTML = '❌ Invalid URL'; return; }
      }
      running = true;
      cycleCount = 0;
      cycleCounterSpan.innerText = `🔄 cycles: 0`;
      statusSpan.innerHTML = `🚀 Starting (${currentMode} mode)`;
      // reset any pending timeouts
      if (currentTimeout) clearTimeout(currentTimeout);
      if (currentSafetyTimer) clearTimeout(currentSafetyTimer);
      if (directRefreshTimeout) clearTimeout(directRefreshTimeout);
      if (currentLoadHandler) iframe.removeEventListener('load', currentLoadHandler);
      currentLoadHandler = null;
      if (currentMode === 'embed') {
        iframe.src = 'about:blank';
        setTimeout(() => { if (running) runCycle(); }, 100);
      } else {
        runCycle();
      }
    }

    // Mode switching
    function setMode(mode) {
      if (running) stopAutomation();
      currentMode = mode;
      if (mode === 'embed') {
        urlInputGroup.style.display = 'block';
        viewportEmbed.style.display = 'block';
        modeEmbedBtn.classList.add('active');
        modeDirectBtn.classList.remove('active');
        statusSpan.innerHTML = '🌐 Embed mode: will load URL in iframe';
      } else {
        urlInputGroup.style.display = 'none';
        viewportEmbed.style.display = 'none';
        modeDirectBtn.classList.add('active');
        modeEmbedBtn.classList.remove('active');
        statusSpan.innerHTML = '📄 Direct mode: clicks on this page + refresh';
      }
    }
    modeEmbedBtn.onclick = () => setMode('embed');
    modeDirectBtn.onclick = () => setMode('direct');
    startBtn.onclick = startAutomation;
    stopBtn.onclick = stopAutomation;
    siteUrlInput.onchange = () => { if (running && currentMode === 'embed') stopAutomation(); };

    // initial setup
    setMode('embed');
  })();
</script>
</body>
</html>
