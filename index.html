  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Auto Visitor · Multi-Click + Parent Page Clicks</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .automator-card {
      max-width: 1400px;
      width: 100%;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.2);
      overflow: hidden;
    }

    .control-panel {
      padding: 1.5rem 2rem;
      background: rgba(2, 8, 23, 0.7);
      border-bottom: 1px solid rgba(71, 85, 105, 0.4);
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
    }

    .input-group {
      flex: 2;
      min-width: 200px;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }

    .url-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 1.2rem;
      padding: 0.7rem 1.2rem;
      font-size: 0.9rem;
      color: #f1f5f9;
      font-family: monospace;
      outline: none;
    }

    .url-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    .options-row {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }

    .opt-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      background: #0f172a60;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
    }

    .opt-item label {
      font-size: 0.65rem;
      font-weight: 500;
      color: #94a3b8;
    }

    .delay-input, .clicks-input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 2rem;
      padding: 0.4rem 0.8rem;
      width: 80px;
      color: white;
      font-weight: 500;
      text-align: center;
    }

    .exclude-input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 1.2rem;
      padding: 0.4rem 0.8rem;
      width: 220px;
      color: white;
      font-size: 0.7rem;
      font-family: monospace;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: #cbd5e1;
      background: #0f172a;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      border: 1px solid #334155;
    }

    .button-group {
      display: flex;
      gap: 1rem;
    }

    .btn {
      border: none;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;

    .btn-start {
      background: #0f3b2c;

    .btn-start:hover {
      background: #166534;
      transform: scale(0.97);
    }

    .btn-stop {
      background: #3b1e2a;
      border: 1px solid #ef4444;

    .status-area {
      display: flex;
      justify-content: space-between;

      font-size: 0.75rem;

      gap: 0.5rem;

    .status-badge {
      font-family: monospace;

    .warning-note {
      font-size: 0.7rem;

    .viewport {
      padding: 1rem 1.5rem 1.8rem 1.5rem;
      background: #020617;
    }

    .iframe-wrapper {
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 20px 35px -10px black;
      border: 1px solid #2d3a5e;
      background: #0f172a;
    }

    iframe {
      width: 100%;
      height: 550px;
      display: block;
      border: none;
      background: white;
    }

    .click-feedback {
      position: fixed;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd966, #ffaa33);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.15s ease;
      box-shadow: 0 0 12px gold;
    }

    footer {
      padding: 0.7rem 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #4b556b;
      border-top: 1px solid #1e293b;
    }

    @media (max-width: 1000px) {
      .control-panel {
        flex-direction: column;
        align-items: stretch;
      }
      .options-row {
        flex-direction: column;
        align-items: stretch;
      }
      .button-group {
        justify-content: stretch;
      }
      iframe {
        height: 420px;
      }
    }

<body>

<div class="automator-card">
  <div class="control-panel">
    <div class="input-group">
      <label>🔗 TARGET URL</label>
      <input type="text" id="siteUrl" class="url-input" placeholder="https://example.com" value="https://example.com">
    </div>

    <div class="options-row">
      <div class="opt-item">
        <label>⏱️ CYCLE DELAY (sec)</label>
        <input type="number" id="cycleDelay" class="delay-input" value="3" step="0.5" min="1" max="15">
      </div>
      <div class="opt-item">
        <label>🎲 IFRAME CLICKS (min/max)</label>
        <div style="display: flex; gap: 5px;">
          <input type="number" id="minClicks" class="clicks-input" value="3" min="1" max="20" step="1">
          <input type="number" id="maxClicks" class="clicks-input" value="4" min="1" max="20" step="1">
        </div>
      </div>
      <div class="opt-item">
        <label>⏲️ CLICK DELAY (sec)</label>
        <input type="number" id="clickDelay" class="delay-input" value="0.15" step="0.05" min="0.05" max="1">
      </div>
      <div class="opt-item">
        <label class="checkbox-label">
          <input type="checkbox" id="randomClickToggle"> 🎯 Random iframe clicks
        </label>
      </div>
    </div>

    <!-- Parent clicks section -->
    <div class="options-row" style="border-top: 1px solid #334155; padding-top: 0.8rem; margin-top: 0.2rem;">
      <div class="opt-item">
        <label class="checkbox-label">
          <input type="checkbox" id="enableParentClicks"> 🖱️ Enable parent page clicks
        </label>
      </div>
      <div class="opt-item">
        <label>📄 PARENT CLICKS (min/max)</label>
        <div style="display: flex; gap: 5px;">
          <input type="number" id="parentMinClicks" class="clicks-input" value="1" min="0" max="10" step="1">
          <input type="number" id="parentMaxClicks" class="clicks-input" value="2" min="0" max="10" step="1">
        </div>
      </div>
      <div class="opt-item">
        <label>🚫 Exclude selectors (CSS)</label>
        <input type="text" id="excludeSelectors" class="exclude-input" value="button, .btn, input, select, textarea, a, [role=button], #targetFrame, .click-feedback, .btn-start, .btn-stop">
      </div>
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-start">▶ START LOOP</button>
      <button id="stopBtn" class="btn btn-stop">⏹️ STOP</button>
    </div>
  </div>

  <div class="status-area">
    <div class="status-badge" id="statusMsg">⚡ idle</div>
    <div class="warning-note" id="securityNote">
      ⚠️ Cross-origin: deep clicks only if SAME ORIGIN (else surface clicks)
    </div>
    <div class="status-badge" id="cycleCounter">🔄 cycles: 0</div>
  </div>

  <div class="viewport">
    <div class="iframe-wrapper">
      <iframe id="targetFrame" title="target site viewer" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation"></iframe>
    </div>
  </div>
  <footer>
    💡 <strong>New: Parent page clicks</strong> — after iframe clicks, the script clicks random elements on this control panel (excluding buttons/inputs). Configurable min/max and exclude selectors.
  </footer>
</div>

<div id="clickEffect" class="click-feedback"></div>

<script>
  (function() {
    // DOM elements
    const urlInput = document.getElementById('siteUrl');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const iframe = document.getElementById('targetFrame');
    const statusSpan = document.getElementById('statusMsg');
    const cycleCounterSpan = document.getElementById('cycleCounter');
    const delayInput = document.getElementById('cycleDelay');
    const minClicksInput = document.getElementById('minClicks');
    const maxClicksInput = document.getElementById('maxClicks');
    const clickDelayInput = document.getElementById('clickDelay');
    const randomClickToggle = document.getElementById('randomClickToggle');
    const enableParentClicks = document.getElementById('enableParentClicks');
    const parentMinClicks = document.getElementById('parentMinClicks');
    const parentMaxClicks = document.getElementById('parentMaxClicks');
    const excludeSelectorsInput = document.getElementById('excludeSelectors');
    const clickEffectDiv = document.getElementById('clickEffect');

    // state
    let running = false;
    let cycleCount = 0;
    let currentTimeout = null;
    let currentLoadHandler = null;
    let currentBaseUrl = '';
    let currentSafetyTimer = null;

    // helper: normalize URL
    function normalizeUrl(raw) {
      let url = raw.trim();
      if (!url) return '';
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      return url;
    }

    function addForceReloadParam(url) {
      try {
        const urlObj = new URL(url);
        urlObj.searchParams.set('_autorefresh', Date.now());
        return urlObj.toString();
      } catch (e) {
        return url + (url.includes('?') ? '&' : '?') + '_autorefresh=' + Date.now();
      }
    }

    function showClickRipple(clientX, clientY, color = '#ffd966') {
      if (!clickEffectDiv) return;
      clickEffectDiv.style.background = `radial-gradient(circle, ${color}, #ffaa33)`;
      clickEffectDiv.style.left = clientX + 'px';
      clickEffectDiv.style.top = clientY + 'px';
      clickEffectDiv.style.opacity = '0.9';
      setTimeout(() => {
        if (clickEffectDiv) clickEffectDiv.style.opacity = '0';
      }, 180);
      setTimeout(() => {
        if (clickEffectDiv) clickEffectDiv.style.background = `radial-gradient(circle, #ffd966, #ffaa33)`;
      }, 200);
    }

    // ---- IFRAME CLICKS (same as before) ----
    function tryDeepClickInsideIframe(iframeElement, randomMode) {
      try {
        const doc = iframeElement.contentDocument;
        if (!doc) return false;
        const body = doc.body;
        if (!body) return false;
        
        let targetElement;
        if (randomMode) {
          const allElements = doc.querySelectorAll('a, button, input, div, p, span, img');
          if (allElements.length > 0) {
            const randomIndex = Math.floor(Math.random() * allElements.length);
            targetElement = allElements[randomIndex];
          } else {
            targetElement = body;
          }
        } else {
          targetElement = body;
        }
        
        const win = iframeElement.contentWindow;
        let rect;
        if (targetElement === body) {
          const viewWidth = win.innerWidth || doc.documentElement.clientWidth;
          const viewHeight = win.innerHeight || doc.documentElement.clientHeight;
          const centerX = viewWidth / 2;
          const centerY = viewHeight / 2;
          const clickEvent = new MouseEvent('click', {
            view: win,
            bubbles: true,
            cancelable: true,
            clientX: centerX,
            clientY: centerY
          });
          targetElement.dispatchEvent(clickEvent);
          const iframeRect = iframeElement.getBoundingClientRect();
          const globalX = iframeRect.left + (centerX / (win.innerWidth || 1)) * iframeRect.width;
          const globalY = iframeRect.top + (centerY / (win.innerHeight || 1)) * iframeRect.height;
          showClickRipple(globalX, globalY, '#ffd966');
          return true;
        } else {
          const elRect = targetElement.getBoundingClientRect();
          const clickX = elRect.left + elRect.width / 2;
          const clickY = elRect.top + elRect.height / 2;
          const clickEvent = new MouseEvent('click', {
            view: win,
            bubbles: true,
            cancelable: true,
            clientX: clickX,
            clientY: clickY
          });
          targetElement.dispatchEvent(clickEvent);
          const iframeRect = iframeElement.getBoundingClientRect();
          const scaleX = iframeRect.width / (win.innerWidth || 1);
          const scaleY = iframeRect.height / (win.innerHeight || 1);
          const globalX = iframeRect.left + clickX * scaleX;
          const globalY = iframeRect.top + clickY * scaleY;
          showClickRipple(globalX, globalY, '#ffd966');
          return true;
        }
      } catch (err) {
        return false;
      }
    }

    function simulateClickOnIframeSurface(iframeElement, randomMode) {
      const rect = iframeElement.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      let clickX, clickY;
      if (randomMode) {
        clickX = rect.left + Math.random() * rect.width;
        clickY = rect.top + Math.random() * rect.height;
      } else {
        clickX = rect.left + rect.width / 2;
        clickY = rect.top + rect.height / 2;
      }
      const clickEvent = new MouseEvent('click', {
        view: window,
        bubbles: true,
        cancelable: true,
        clientX: clickX,
        clientY: clickY
      });
      iframeElement.dispatchEvent(clickEvent);
      showClickRipple(clickX, clickY, '#ffaa66');
    }

    async function performOneIframeClick(randomMode) {
      if (!running) return false;
      const clickedInside = tryDeepClickInsideIframe(iframe, randomMode);
      if (!clickedInside) {
        simulateClickOnIframeSurface(iframe, randomMode);
        return false;
      }
      return true;
    }

    async function performIframeClickSequence() {
      if (!running) return;
      let min = parseInt(minClicksInput.value, 10);
      let max = parseInt(maxClicksInput.value, 10);
      if (isNaN(min)) min = 3;
      if (isNaN(max)) max = 4;
      if (min > max) { let tmp = min; min = max; max = tmp; }
      if (min < 1) min = 1;
      const numClicks = Math.floor(Math.random() * (max - min + 1)) + min;
      const randomMode = randomClickToggle.checked;
      const interClickDelaySec = parseFloat(clickDelayInput.value);
      const delayMs = Math.max(50, (isNaN(interClickDelaySec) ? 0.15 : interClickDelaySec) * 1000);
      
      statusSpan.innerHTML = `🖱️ iframe: ${numClicks} click(s) ...`;
      for (let i = 0; i < numClicks; i++) {
        if (!running) break;
        statusSpan.innerHTML = `🖱️ iframe click ${i+1}/${numClicks} ${randomMode ? '🎲 random' : '📍 center'}`;
        await performOneIframeClick(randomMode);
        if (i < numClicks - 1 && running) {
          await new Promise(resolve => setTimeout(resolve, delayMs));
        }
      }
      if (running) statusSpan.innerHTML = `✅ iframe clicks done.`;
    }

    // ---- PARENT PAGE CLICKS (new) ----
    async function performParentClicks() {
      if (!enableParentClicks.checked) return;
      let min = parseInt(parentMinClicks.value, 10);
      let max = parseInt(parentMaxClicks.value, 10);
      if (isNaN(min)) min = 1;
      if (isNaN(max)) max = 2;
      if (min > max) { let tmp = min; min = max; max = tmp; }
      if (min < 0) min = 0;
      const numClicks = Math.floor(Math.random() * (max - min + 1)) + min;
      if (numClicks === 0) return;
      
      const excludeSelector = excludeSelectorsInput.value.trim() || "button, .btn, input, select, textarea, a";
      const interClickDelaySec = parseFloat(clickDelayInput.value);
      const delayMs = Math.max(50, (isNaN(interClickDelaySec) ? 0.15 : interClickDelaySec) * 1000);
      
      statusSpan.innerHTML = `📄 parent: ${numClicks} click(s) on page ...`;
      for (let i = 0; i < numClicks; i++) {
        if (!running) break;
        // get all elements in parent document that are visible and not excluded
        const allElements = Array.from(document.querySelectorAll('body *'));
        const clickableCandidates = allElements.filter(el => {
          if (!el.isConnected) return false;
          const rect = el.getBoundingClientRect();
          if (rect.width <= 0 || rect.height <= 0) return false;
          // exclude if matches any exclude selector
          if (el.matches && el.matches(excludeSelector)) return false;
          // also exclude ancestors that are excluded? simple version: just element itself.
          // additionally, never click on the click effect div or iframe itself (already in exclude)
          return true;
        });
        
        if (clickableCandidates.length === 0) {
          statusSpan.innerHTML = `⚠️ No clickable parent elements (check exclude list)`;
          break;
        }
        
        const randomIndex = Math.floor(Math.random() * clickableCandidates.length);
        const targetEl = clickableCandidates[randomIndex];
        const rect = targetEl.getBoundingClientRect();
        const clickX = rect.left + rect.width / 2;
        const clickY = rect.top + rect.height / 2;
        
        const clickEvent = new MouseEvent('click', {
          view: window,
          bubbles: true,
          cancelable: true,
          clientX: clickX,
          clientY: clickY
        });
        targetEl.dispatchEvent(clickEvent);
        showClickRipple(clickX, clickY, '#88ccff');
        statusSpan.innerHTML = `📄 parent click ${i+1}/${numClicks} on ${targetEl.tagName.toLowerCase()}`;
        
        if (i < numClicks - 1 && running) {
          await new Promise(resolve => setTimeout(resolve, delayMs));
        }
      }
      if (running) statusSpan.innerHTML = `✅ parent clicks done.`;
    }

    // refresh iframe
    function refreshIframe(url) {
      if (!url) return false;
      const reloadUrl = addForceReloadParam(url);
      if (currentLoadHandler) {
        iframe.removeEventListener('load', currentLoadHandler);
        currentLoadHandler = null;
      }
      iframe.src = reloadUrl;
      return true;
    }

    // main cycle: refresh -> wait load -> iframe clicks -> parent clicks -> wait cycle delay -> repeat
    function startCycle() {
      if (!running) return;
      if (currentLoadHandler) {
        iframe.removeEventListener('load', currentLoadHandler);
        currentLoadHandler = null;
      }
      
      const baseUrl = currentBaseUrl;
      if (!baseUrl) {
        statusSpan.innerHTML = '⚠️ Invalid URL. Stopping.';
        stopAutomation();
        return;
      }
      
      statusSpan.innerHTML = `🔄 REFRESHING → ${new URL(baseUrl).hostname}`;
      refreshIframe(baseUrl);
      
      const onLoadHandler = async () => {
        if (!running) return;
        // 1. perform iframe clicks
        await performIframeClickSequence();
        if (!running) return;
        // 2. perform parent page clicks (if enabled)
        await performParentClicks();
        if (!running) return;
        
        const cycleDelaySec = parseFloat(delayInput.value);
        const cycleDelayMs = Math.max(1000, (isNaN(cycleDelaySec) ? 3 : cycleDelaySec) * 1000);
        statusSpan.innerHTML = `⏳ waiting ${cycleDelayMs/1000}s before next refresh...`;
        if (currentTimeout) clearTimeout(currentTimeout);
        currentTimeout = setTimeout(() => {
          if (running) {
            cycleCount++;
            cycleCounterSpan.innerText = `🔄 cycles: ${cycleCount}`;
            startCycle();
          }
        }, cycleDelayMs);
        
        if (currentLoadHandler) {
          iframe.removeEventListener('load', currentLoadHandler);
          currentLoadHandler = null;
        }
      };
      
      currentLoadHandler = onLoadHandler;
      iframe.addEventListener('load', currentLoadHandler);
      
      // safety: if iframe never loads, still continue after 10 sec
      if (currentSafetyTimer) clearTimeout(currentSafetyTimer);
      currentSafetyTimer = setTimeout(() => {
        if (running && currentLoadHandler) {
          iframe.removeEventListener('load', currentLoadHandler);
          currentLoadHandler = null;
          // force proceed
          (async () => {
            await performIframeClickSequence();
            if (running) await performParentClicks();
            if (running) {
              const cycleDelaySec = parseFloat(delayInput.value);
              const cycleDelayMs = Math.max(1000, (isNaN(cycleDelaySec) ? 3 : cycleDelaySec) * 1000);
              currentTimeout = setTimeout(() => {
                if (running) {
                  cycleCount++;
                  cycleCounterSpan.innerText = `🔄 cycles: ${cycleCount}`;
                  startCycle();
                }
              }, cycleDelayMs);
            }
          })();
        }
      }, 10000);
    }
    
    function stopAutomation() {
      running = false;
      if (currentTimeout) { clearTimeout(currentTimeout); currentTimeout = null; }
      if (currentSafetyTimer) { clearTimeout(currentSafetyTimer); currentSafetyTimer = null; }
      if (currentLoadHandler) {
        iframe.removeEventListener('load', currentLoadHandler);
        currentLoadHandler = null;
      }
      statusSpan.innerHTML = '⏹️ STOPPED · idle';
      startBtn.disabled = false;
      stopBtn.disabled = false;
    }
    
    function startAutomation() {
      if (running) stopAutomation();
      let rawUrl = urlInput.value;
      let normalized = normalizeUrl(rawUrl);
      if (!normalized) {
        statusSpan.innerHTML = '❌ Please enter a valid URL (https://...)';
        return;
      }
      try { new URL(normalized); } catch(e) {
        statusSpan.innerHTML = '❌ Invalid URL format.';
        return;
      }
      
      cycleCount = 0;
      cycleCounterSpan.innerText = `🔄 cycles: 0`;
      currentBaseUrl = normalized;
      
      if (currentLoadHandler) iframe.removeEventListener('load', currentLoadHandler);
      if (currentTimeout) clearTimeout(currentTimeout);
      if (currentSafetyTimer) clearTimeout(currentSafetyTimer);
      currentLoadHandler = null;
      
      running = true;
      statusSpan.innerHTML = `🚀 STARTING loop → ${new URL(normalized).hostname}`;
      iframe.src = 'about:blank';
      setTimeout(() => {
        if (running) startCycle();
      }, 80);
    }
    
    startBtn.addEventListener('click', startAutomation);
    stopBtn.addEventListener('click', stopAutomation);
    urlInput.addEventListener('change', () => { if (running) stopAutomation(); });
    
    iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation');
    const defaultExample = 'https://example.com';
    urlInput.value = defaultExample;
    currentBaseUrl = defaultExample;
    iframe.src = 'about:blank';
    statusSpan.innerHTML = '⚡ idle · set URL & START (now with parent page clicks)';
  })();
</script>
</body>
</html>
